name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - bhoomi

jobs:
  # Job 1: Always test the code, no matter what branch it is
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t my-devops-api .

  # Job 2: ONLY runs if we push to 'staging'
  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build-and-test # Wait for the test to pass first!
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Fake Deploy to AWS Staging
        run: echo "Deploying this Docker container to the secret AWS Staging Server!"

  # Job 3: ONLY runs if we push to 'main'
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Fake Deploy to AWS Production
        run: echo "DANGER! Deploying to the LIVE AWS Production Server for real customers!"
